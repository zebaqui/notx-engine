syntax = "proto3";

package notx.v1;

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/zebaqui/notx-engine/proto;notxpb";

// ─────────────────────────────────────────────────────────────────────────────
// Shared message types
// ─────────────────────────────────────────────────────────────────────────────

// NoteType mirrors the core.NoteType enum.
enum NoteType {
  NOTE_TYPE_UNSPECIFIED = 0;
  NOTE_TYPE_NORMAL = 1;
  NOTE_TYPE_SECURE = 2;
}

// NoteHeader carries the identifying metadata for a note without its full
// event stream. Used in list responses and lightweight lookups.
message NoteHeader {
  string urn = 1; // notx:note:<uuid>
  string name = 2;
  NoteType note_type = 3;
  string project_urn = 4; // optional
  string folder_urn = 5; // optional
  bool deleted = 6;

  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// LineEntry mirrors core.LineEntry.
message LineEntry {
  // Op values: 0 = SET, 1 = SET_EMPTY, 2 = DELETE
  int32 op = 1;
  int32 line_number = 2;
  string content = 3;
}

// Event mirrors core.Event.
message Event {
  string urn = 1; // optional; notx:event:<uuid>
  string note_urn = 2;
  int32 sequence = 3;
  string author_urn = 4;

  google.protobuf.Timestamp created_at = 5;

  // For normal notes: line entries are populated.
  repeated LineEntry entries = 6;

  // For secure notes: entries is empty; the encrypted blob is here instead.
  EncryptedEvent encrypted = 7;

  // Per-device wrapped Content Encryption Keys. Maps device URN →
  // ECDH-wrapped CEK copy. Populated on secure note events and used when
  // forwarding shared notes between servers (absorbs SharedEventProto).
  map<string, bytes> wrapped_keys = 8;
}

// EncryptedEvent carries the opaque encrypted payload for secure note
// events. The server stores and relays this verbatim — it never inspects
// payload or derives any key from per_device_keys.
message EncryptedEvent {
  bytes nonce = 1; // AES-GCM nonce (12 bytes)
  bytes payload = 2; // AES-256-GCM ciphertext of the serialised line entries

  // per_device_keys maps device URN strings to their ECDH-wrapped CEK copy.
  // Key:   "notx:device:<uuid>"
  // Value: wrapped CEK bytes (X25519 ECDH + HKDF derived, then AES-GCM wrapped)
  map<string, bytes> per_device_keys = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// NoteService — primary CRUD + relay service
// ─────────────────────────────────────────────────────────────────────────────

service NoteService {
  // GetNote returns the full header + all events for a note.
  rpc GetNote(GetNoteRequest) returns (GetNoteResponse);

  // ListNotes returns all note headers visible to the caller.
  rpc ListNotes(ListNotesRequest) returns (ListNotesResponse);

  // CreateNote registers a new note (header only; events follow via AppendEvent).
  rpc CreateNote(CreateNoteRequest) returns (CreateNoteResponse);

  // UpdateNote mutates mutable metadata fields on a note using a FieldMask
  // for partial update semantics.
  rpc UpdateNote(UpdateNoteRequest) returns (UpdateNoteResponse);

  // DeleteNote soft-deletes a note by URN.
  rpc DeleteNote(DeleteNoteRequest) returns (DeleteNoteResponse);

  // AppendEvent appends a single event to an existing note.
  // For normal notes the server stores the plaintext entries and advances the
  // index. For secure notes it stores the encrypted blob verbatim.
  rpc AppendEvent(AppendEventRequest) returns (AppendEventResponse);

  // StreamEvents opens a server-side stream that pushes all events for a note
  // starting from a given sequence number. Used by clients to catch up after
  // reconnect. For secure note events the server streams the encrypted blob
  // without decrypting it.
  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);

  // SearchNotes performs a server-side full-text search over normal note
  // content. Secure notes are never included in results.
  rpc SearchNotes(SearchNotesRequest) returns (SearchNotesResponse);

  // ReplaceContent atomically diffs the supplied plain-text content against the
  // note's current state and appends a single event capturing the delta.
  // Not permitted on secure notes.
  rpc ReplaceContent(ReplaceContentRequest) returns (ReplaceContentResponse);

  // Secure note sharing.

  // ShareSecureNote merges per-device wrapped Content Encryption Keys into
  // every stored Event for the note without ever seeing the plaintext CEK.
  rpc ShareSecureNote(ShareSecureNoteRequest) returns (ShareSecureNoteResponse);

  // ReceiveSharedNote stores a note header and event stream forwarded from a
  // paired server. Idempotent: only events beyond the local head are written.
  rpc ReceiveSharedNote(ReceiveSharedNoteRequest) returns (ReceiveSharedNoteResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Request / Response messages — NoteService
// ─────────────────────────────────────────────────────────────────────────────

// --- GetNote ---

message GetNoteRequest {
  string urn = 1; // notx:note:<uuid>
}

message GetNoteResponse {
  NoteHeader header = 1;
  repeated Event events = 2;
}

// --- ListNotes ---

message ListNotesRequest {
  // Optional filters.
  string project_urn = 1;
  string folder_urn = 2;
  NoteType note_type = 3; // NOTE_TYPE_UNSPECIFIED = return all types
  bool include_deleted = 4;

  // Pagination.
  int32 page_size = 5; // 0 = server default (50)
  string page_token = 6;
}

message ListNotesResponse {
  repeated NoteHeader notes = 1;
  string next_page_token = 2; // empty = last page
}

// --- CreateNote ---

message CreateNoteRequest {
  // The caller supplies a fully formed header; the server validates and
  // persists it. The URN must be globally unique.
  NoteHeader header = 1;
}

message CreateNoteResponse {
  NoteHeader header = 1;
}

// --- UpdateNote ---

message UpdateNoteRequest {
  // URN of the note to update.
  string urn = 1;

  // Updated header fields. Only paths listed in update_mask are applied.
  NoteHeader header = 2;

  // FieldMask controlling which fields of header are written.
  // Supports: name, project_urn, folder_urn, deleted.
  google.protobuf.FieldMask update_mask = 3;
}

message UpdateNoteResponse {
  NoteHeader header = 1;
}

// --- DeleteNote ---

message DeleteNoteRequest {
  string urn = 1;
}

message DeleteNoteResponse {
  // URN of the note that was deleted.
  string urn = 1;
  bool deleted = 2;
}

// --- AppendEvent ---

message AppendEventRequest {
  Event event = 1;
}

message AppendEventResponse {
  // The server-assigned sequence number of the stored event.
  int32 sequence = 1;
}

// --- StreamEvents ---

message StreamEventsRequest {
  string note_urn = 1;
  int32 from_sequence = 2; // inclusive; 0 = stream from first event
}

message StreamEventsResponse {
  Event event = 1;
}

// --- SearchNotes ---

message SearchNotesRequest {
  string query = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message SearchNotesResponse {
  repeated SearchResult results = 1;
  string next_page_token = 2;
}

message SearchResult {
  NoteHeader header = 1;
  string excerpt = 2; // short snippet of matching content
}

// --- ReplaceContent ---

message ReplaceContentRequest {
  // URN of the note whose content should be replaced.
  string note_urn = 1;

  // Full plain-text replacement content. The server diffs this against the
  // current state and appends a single event capturing the delta.
  string content = 2;

  // URN of the author to record on the generated event.
  // When empty the server substitutes a namespace-scoped anonymous sentinel.
  string author_urn = 3;
}

message ReplaceContentResponse {
  // URN of the note that was updated.
  string note_urn = 1;

  // Server-assigned sequence number of the appended event.
  // Equals the note's previous HeadSequence when changed is false.
  int32 sequence = 2;

  // True when a diff was found and a new event was appended.
  // False when the supplied content was identical to the current state.
  bool changed = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// ShareSecureNote
// ─────────────────────────────────────────────────────────────────────────────

message ShareSecureNoteRequest {
  string note_urn = 1;
  map<string, bytes> wrapped_keys = 2;
}

message ShareSecureNoteResponse {
  int32 events_updated = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// ReceiveSharedNote
// ─────────────────────────────────────────────────────────────────────────────

message ReceiveSharedNoteRequest {
  NoteHeader header = 1;
  repeated Event events = 2;
}

message ReceiveSharedNoteResponse {
  string note_urn = 1;
  int32 events_stored = 2;
}
