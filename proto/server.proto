syntax = "proto3";

package notx.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/zebaqui/notx-engine/proto;notxpb";

// ─────────────────────────────────────────────────────────────────────────────
// ServerPairingService — server-to-server registration and certificate
// lifecycle management.
//
// This file is the single authoritative definition of ServerPairingService.
// The duplicate declaration that previously lived in notx.proto has been
// removed; pairing_manual.go is replaced by the output of protoc.
// ─────────────────────────────────────────────────────────────────────────────

service ServerPairingService {
  // RegisterServer registers a new peer server, issuing it a signed TLS
  // certificate from the local CA. The caller presents a CSR and a
  // short-lived pairing secret obtained via CreatePairingSecret.
  rpc RegisterServer(RegisterServerRequest) returns (RegisterServerResponse);

  // RenewCertificate issues a fresh certificate for an already-registered
  // server before the current certificate expires.
  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse);

  // GetCACertificate returns the CA certificate in PEM form so that clients
  // can pin it for mTLS verification.
  rpc GetCACertificate(GetCACertificateRequest) returns (GetCACertificateResponse);

  // ListServers returns all registered peer servers, optionally including
  // revoked entries.
  rpc ListServers(ListServersRequest) returns (ListServersResponse);

  // RevokeServer revokes a peer server's certificate and marks it inactive.
  // Future connections from that server will be rejected.
  rpc RevokeServer(RevokeServerRequest) returns (RevokeServerResponse);

  // CreatePairingSecret mints a short-lived secret token that a new peer
  // server can present in a RegisterServer call to authenticate itself.
  // The plaintext is returned exactly once and is not stored server-side.
  rpc CreatePairingSecret(CreatePairingSecretRequest) returns (CreatePairingSecretResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Server — describes a registered peer server
// ─────────────────────────────────────────────────────────────────────────────

message Server {
  string server_urn = 1;
  string server_name = 2;
  string endpoint = 3;
  bool revoked = 4;
  google.protobuf.Timestamp registered_at = 5;
  google.protobuf.Timestamp expires_at = 6;
  google.protobuf.Timestamp last_seen_at = 7;
}

// ─────────────────────────────────────────────────────────────────────────────
// RegisterServer
// ─────────────────────────────────────────────────────────────────────────────

message RegisterServerRequest {
  // URN of the registering server (notx:srv:<uuid>).
  string server_urn = 1;

  // PEM-encoded Certificate Signing Request generated by the new server.
  bytes csr = 2;

  // Short-lived pairing secret previously issued by CreatePairingSecret.
  string pairing_secret = 3;

  // Human-readable name for this server (e.g. "eu-west-1 replica").
  string server_name = 4;

  // Public gRPC endpoint of the registering server (host:port).
  string endpoint = 5;
}

message RegisterServerResponse {
  // URN of the newly registered server, echoed from the request.
  string server_urn = 1;

  // PEM-encoded signed TLS certificate issued by the local CA.
  bytes certificate = 2;

  // PEM-encoded CA certificate. The new server should pin this for mTLS.
  bytes ca_certificate = 3;

  // UTC timestamp when the issued certificate expires.
  google.protobuf.Timestamp expires_at = 4;

  // UTC timestamp when the server record was created.
  google.protobuf.Timestamp registered_at = 5;
}

// ─────────────────────────────────────────────────────────────────────────────
// RenewCertificate
// ─────────────────────────────────────────────────────────────────────────────

message RenewCertificateRequest {
  // URN of the server requesting renewal.
  string server_urn = 1;

  // PEM-encoded CSR for the new certificate.
  bytes csr = 2;
}

message RenewCertificateResponse {
  // PEM-encoded renewed TLS certificate.
  bytes certificate = 1;

  // UTC timestamp when the renewed certificate expires.
  google.protobuf.Timestamp expires_at = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// GetCACertificate
// ─────────────────────────────────────────────────────────────────────────────

// GetCACertificateRequest carries no fields; the CA cert is global.
message GetCACertificateRequest {}

message GetCACertificateResponse {
  // PEM-encoded CA certificate.
  bytes ca_certificate = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// ListServers
// ─────────────────────────────────────────────────────────────────────────────

message ListServersRequest {
  // When true, revoked servers are included in the response.
  bool include_revoked = 1;
}

message ListServersResponse {
  repeated Server servers = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// RevokeServer
// ─────────────────────────────────────────────────────────────────────────────

message RevokeServerRequest {
  string server_urn = 1;
}

message RevokeServerResponse {
  // URN of the server that was revoked, echoed from the request.
  string server_urn = 1;

  // True when the server record was found and marked as revoked.
  bool revoked = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// CreatePairingSecret
// ─────────────────────────────────────────────────────────────────────────────

// CreatePairingSecretRequest asks the server to mint a new pairing secret.
message CreatePairingSecretRequest {
  // Human-readable label to identify this secret (e.g. "staging-peer-2025").
  string label = 1;
}

// CreatePairingSecretResponse carries the newly minted secret.
// The plaintext is returned exactly once and is not stored server-side after
// this response is delivered.
message CreatePairingSecretResponse {
  // Opaque identifier for this secret record (used for auditing/revocation).
  string id = 1;

  // The label echoed from the request.
  string label = 2;

  // The plaintext secret value. Show to the operator once, then discard.
  string plaintext = 3;

  // UTC timestamp after which this secret will no longer be accepted by
  // RegisterServer.
  google.protobuf.Timestamp expires_at = 4;
}
