# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/release-client-tap.yml
#
# Triggered via repository_dispatch from the notx (client) repo whenever a
# new "client-v*" release is published.  Receives the version + SHA256 hashes
# for the macOS DMG/ZIP artifacts and writes the notx-desktop formula into
# the zebaqui/homebrew-notx tap.
# ─────────────────────────────────────────────────────────────────────────────
name: Update Client Homebrew Tap

on:
  repository_dispatch:
    types:
      - notx-client-release

permissions:
  contents: read # only needs to read this repo; tap is updated via token

jobs:
  update-tap:
    name: Update Homebrew tap (notx-desktop)
    runs-on: ubuntu-latest

    steps:
      - name: Extract payload
        id: payload
        run: |
          echo "version=${{ github.event.client_payload.version }}"           >> "$GITHUB_OUTPUT"
          echo "version_bare=${{ github.event.client_payload.version_bare }}" >> "$GITHUB_OUTPUT"
          echo "dmg_arm64=${{ github.event.client_payload.dmg_arm64_sha }}"   >> "$GITHUB_OUTPUT"
          echo "zip_arm64=${{ github.event.client_payload.zip_arm64_sha }}"   >> "$GITHUB_OUTPUT"
          echo "dmg_amd64=${{ github.event.client_payload.dmg_amd64_sha }}"   >> "$GITHUB_OUTPUT"
          echo "zip_amd64=${{ github.event.client_payload.zip_amd64_sha }}"   >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: zebaqui/homebrew-notx
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render notx-desktop formula
        env:
          VERSION: ${{ steps.payload.outputs.version }}
          VERSION_BARE: ${{ steps.payload.outputs.version_bare }}
          DMG_ARM64: ${{ steps.payload.outputs.dmg_arm64 }}
          ZIP_ARM64: ${{ steps.payload.outputs.zip_arm64 }}
          DMG_AMD64: ${{ steps.payload.outputs.dmg_amd64 }}
          ZIP_AMD64: ${{ steps.payload.outputs.zip_amd64 }}
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/notx-desktop.rb << EOF
          # This file is auto-generated by the notx-engine release-client-tap workflow.
          # Do not edit it by hand — changes will be overwritten on the next client release.
          class NotxDesktop < Formula
            desc "notx desktop — Electron client for the notx engine"
            homepage "https://github.com/zebaqui/notx"
            version "${VERSION_BARE}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/zebaqui/notx/releases/download/${VERSION}/notx-${VERSION}-darwin-arm64.zip"
                sha256 "${ZIP_ARM64}"
              else
                url "https://github.com/zebaqui/notx/releases/download/${VERSION}/notx-${VERSION}-darwin-amd64.zip"
                sha256 "${ZIP_AMD64}"
              end
            end

            def install
              arch = Hardware::CPU.arm? ? "arm64" : "amd64"
              app = "notx.app"
              prefix.install app
              bin.write_exec_script prefix / "#{app}/Contents/MacOS/notx"
            end

            test do
              assert_predicate prefix / "notx.app", :directory?
            end
          end
          EOF

      - name: Commit & push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/notx-desktop.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "notx-desktop ${{ steps.payload.outputs.version }}"
          git push
